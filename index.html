<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tool Registrazione Presenze PWA</title>

<script src="dist/vue.global.js"></script>
<script src="dist/html5-qrcode@2.3.8.js"></script>

<!-- <link rel="manifest" href="manifest.json"> -->
<meta name="theme-color" content="#4caf50">

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f5f5f5;
  }

  h2, h3 {
    color: #333;
  }

  input[type=text],
  input[type=number] {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
    margin-bottom: 8px;
  }

  input:focus {
    border-color: #4caf50;
    outline: none;
  }

  button {
    padding: 6px 12px;
    margin: 2px;
    border: none;
    border-radius: 4px;
    background: #4caf50;
    color: white;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: #45a049;
  }

  button.red {
    background-color: rgb(241, 26, 26);
  }

  button.red:hover {
    background: red;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    border-radius: 6px;
    overflow: hidden;
  }

  thead {
    background: #4caf50;
    color: #fff;
  }

  th, td {
    padding: 8px 10px;
    text-align: left;
  }

  tr:nth-child(even) {
    background: #f9f9f9;
  }

  #table-container {
    max-height: 400px;
    overflow-y: auto;
    border-radius: 6px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  }

  #in-code {
    height: 30px;
    border-radius: 4px;
    border: 1px solid #4caf50;
    font-size: 1.1em;
  }

  .display-none {
    display: none;
  }
  .box-scan {
    position: relative;
    width: 100%;
    height: auto;
  }
  #qr-reader {
    position: relative;
    width: 100%;
    height: auto;
    border-radius: 6px;
    overflow: hidden;
    border-color: #4caf50;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
  }
  #layar-laser {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #qr-overlay {
    border: 3px solid red;
    box-sizing: border-box;
    pointer-events: none;
    border-radius: 6px;
  }
  #laser {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255, 0, 0, 0.8);
    animation: laserMove 1.5s linear infinite;
    z-index: 2;
  }

  @keyframes laserMove {
    0% {
      top: 0;
    }

    50% {
      top: calc(100% - 2px);
    }

    100% {
      top: 0;
    }
  }

  .progress {
    width: 100%;
    border: 1px solid #ccc;
    height: 22px;
    margin-top: 10px;
    border-radius: 4px;
    background: #eee;
  }

  .bar {
    height: 100%;
    background: #4caf50;
    transition: width 0.3s;
    border-radius: 4px;
  }

  .status-ok {
    color: green;
    font-weight: bold;
  }

  .status-fail {
    color: red;
    font-weight: bold;
  }

  .div-import {
    position: relative;
  }
  .div-import button {
    position: relative;
  }
  .div-import input {
    display: inline-block;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    opacity: 0;
    z-index: 1;
    cursor: pointer;
  }
  .div-actions-top {
    display: flex;
  }
  .box-zoom {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px;
     margin-top: 10px;
     background: rgba(255, 255, 255, 0.9);
     border-radius: 6px;
     box-shadow: 0 2px 5px #4caf50;
     position: relative;
  }
  #in-zoom {
    width: 100%;
  }
  .container-scan {
    width: 100%;
    max-width: 900px;
  }
  .box-code-actions {
    display: flex;
    justify-content: space-between;
  }
  .layar-settings-zoom {
    position: absolute;
    top: 100%;
    left: 0;
    z-index: 3;
    background-color: white;
    padding: 0.5em;
  }

</style>
</head>
<body>

<div id="app">

<h2>Lista persone</h2>
<div class="div-actions-top">
  <div class="div-export">
    <button @click="exportJson">ESPORTA LISTA</button>
  </div>
  <div class="div-import">
    <button >IMPORTA LISTA</button>
    <input class="in-import" type="file" @change="importJson" placeholder="IMPORTA LISTA">
  </div>
</div>

<h3>Filtra lista:</h3>
<input type="text" v-model="filterText" placeholder="Cerca codice o nominativo">

<div id="table-container">
<table>
<thead>
<tr>
<th>Codice Persona</th>
<th>Nominativo</th>
<th>Abilitato</th>
<th>Stato</th>
<th></th>
</tr>
</thead>
<tbody>
<tr v-for="(p,i) in filteredPersone" :key="i">
<td><input v-model="p.codicePersona"></td>
<td><input v-model="p.labelNominativo"></td>
<td style="text-align:center"><input type="checkbox" v-model="p.abilitato"></td>
<td>
<span v-if="p.status==='ok'" class="status-ok">✔</span>
<span v-else-if="p.status==='fail'" class="status-fail">❌</span>
</td>
<td><button @click="remove(i)">-</button></td>
</tr>
</tbody>
</table>
</div>

<button @click="add">+ aggiungi</button>
<hr>

<h3>Codice</h3>
<div class="box-code-actions">
  <input id="in-code"v-model="codice" placeholder="Inserisci Codice Lezione"> 
  <button @click="startScan">📷 QR</button>
</div>

<div class="container-scan" v-show="scanning">
  <div class="box-zoom" :data-zoom-ability="canZoom">
    <button @click="toogleValueBool('openToolSettingZoom')">⚙️</button> ZOOM<strong>[-]</strong><input id="in-zoom" type="range" min="1" :max="customSettingsZoom.maxZoom" step="1" v-model="zoomLevel" @input="setZoom($event)"><strong>[+]</strong>
    <div class="layar-settings-zoom" v-show="openToolSettingZoom">
      <table >
        IMPOSTAZIONI ZOOM
        <tr>
          <td>fps</td>
          <td><input type="number" v-model="customSettingsZoom.fps"></td>
        </tr>
        <tr>
          <td>qrbox</td>
          <td><input type="number" min="50" v-model="customSettingsZoom.qrbox"></td>
        </tr>
        <tr>
          <td>max zoom</td>
          <td><input type="number" v-model="customSettingsZoom.maxZoom"></td>
        </tr> 
        <tr>
          <td>abilita zoon <br>se supportato</td>
          <td><input type="checkbox" v-model="customSettingsZoom.showZoomSliderIfSupported"></td>
        </tr>
        <tr>
          <td>default zoom <br> se supportato</td>
          <td><input type="number" v-model="customSettingsZoom.defaultZoomValueIfSupported"></td>
        </tr>       
      </table>
      <button @click="setCustomSettingsZoom()">IMPOSTA</button> <button class="red" @click="setCustomSettingsZoom(true)">RESETTA</button>
    </div>
  </div>
  <div class="box-scan">
    <div id="layar-laser">
      <div id="qr-overlay"></div>
      <div id="laser"></div>
    </div>
    <div id="qr-reader"></div>
  </div>
</div>


<br><br>
<button @click="start" :disabled="running">INVIA</button>

<div v-if="percent>0">
<div class="progress"><div class="bar" :style="{width:percent+'%'}"></div></div>
<p>{{percent}} %</p>
</div>

<div v-if="finished">
<p v-if="logsError.length == 0">✔ Tutte le chiamate completate</p>
<div v-if="logsError.length">
<p>❌ {{logsError.length}} chiamate fallite</p>
<ul>
<li v-for="e in logsError">{{e.message}}</li>
</ul>
</div>
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      openToolSettingZoom: false,
      customSettingsZoom: {
          fps: 15, 
          qrbox: 300,
          maxZoom: 10,
          showZoomSliderIfSupported: true,
          defaultZoomValueIfSupported: 2,
      },
      zoomLevel: 1,
      qr: null,
      scanning: false,
      persone: [],
      codice: "",
      percent: 0,
      running: false,
      finished: false,
      logs: [], // {message: string, result: string, status: string'}
      filterText: "",
      apiUrl: "/.netlify/functions/proxy",
    };
  },
  mounted() {
    const saved = localStorage.getItem("listaPersone");
    if (saved) this.persone = JSON.parse(saved);

    const savedSatting = localStorage.getItem("customSettingsZoom");
    if (savedSatting) this.customSettingsZoom = JSON.parse(savedSatting);

    /*if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service Worker registrato"))
        .catch(err => console.log(err));
    }*/
  },
  watch: {
    persone: {
      handler() {
        localStorage.setItem("listaPersone", JSON.stringify(this.persone));
      },
      deep: true
    },
  },
  computed: {
    filteredPersone() {
      if (!this.filterText) return this.persone;
      const text = this.filterText.toLowerCase();
      return this.persone.filter(p =>
        p.codicePersona.toLowerCase().includes(text) ||
        p.labelNominativo.toLowerCase().includes(text)
      );
    },
    logsError() {
      return this.logs.filter(l => l.status === "fail");
    },
    canZoom() {
      if (!this.qr) return false;
      if (typeof this.qr.getRunningTrack !== "function") return false;
      const track = this.qr.getRunningTrack();
      if (!track) return false;
      const capabilities = track.getCapabilities();
      return capabilities.zoom;
    }
  },
  methods: {
    toogleValueBool(key) {
      this[key] = !this[key]
    },
    add() {
      this.persone.push({
        codicePersona: "",
        labelNominativo: "",
        abilitato: true,
        status: ""
      });
    },
    remove(i) {
      this.persone.splice(i, 1);
    },
    exportJson() {
      const data = JSON.stringify(this.persone, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "lista.json";
      a.click();
      URL.revokeObjectURL(url);
    },
    importJson(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        this.persone = JSON.parse(event.target.result);
      };
      reader.readAsText(file);
    },
    setCustomSettingsZoom(reset = false) {
      if (reset)  {
        this.customSettingsZoom = {
          fps: 15, 
          qrbox: 300,
          maxZoom: 10,
          showZoomSliderIfSupported: true,
          defaultZoomValueIfSupported: 2,
        };
      }
      localStorage.setItem("customSettingsZoom", JSON.stringify(this.customSettingsZoom));
      this.openToolSettingZoom = false;
      this.startScan();
    },
    startScan() {
      if (this.scanning) {
        this.scanning = false;
        if (this.qr) {
          this.qr.stop().catch(() => {});
        }
        return
      }
      this.scanning = true;
      if (!this.qr) {
        this.qr = new Html5Qrcode("qr-reader");
      }
      this.qr.start(
        { facingMode: "environment" },
        { 
          fps: this.customSettingsZoom.fps, 
          qrbox: this.customSettingsZoom.qrbox,
          showZoomSliderIfSupported: this.customSettingsZoom.showZoomSliderIfSupported,
          defaultZoomValueIfSupported: this.customSettingsZoom.defaultZoomValueIfSupported,
        },
        (decodedText) => {
          this.codice = decodedText;
          this.scanning = false;
          this.zoomLevel = 1;
          if (navigator.vibrate) navigator.vibrate(200);
          this.qr.stop().catch(() => {});
          this.start();
        },
        (err) => {}
      ).then(() => {
      // set timeout to apply zoom after camera starts
       setTimeout(() => {
         const track =  (this.qr && typeof this.qr.getRunningTrack === "function") ? this.qr.getRunningTrack() : null;
         if (!track) {
          console.log("No running track found: zoom non supported");
          return;
        }
        // setZoom({target: {value: this.zoomLevel}});
        /* const capabilities = track.getCapabilities();
         if (capabilities.zoom) {
           track.applyConstraints({
             advanced: [{ zoom: capabilities.zoom.max }]
           });
         }*/
       }, 1000);
      }).catch(err => {
        alert("Impossibile accedere alla camera. Assicurati di aver concesso i permessi e di avere una camera funzionante. Error: " + err.message);
        console.log("Impossibile accedere alla camera", err);
      });
    },
    setZoom(e) {
      const zoom = Number(e.target.value);
      let track = null;
      if (this.canZoom) {
        track = this.qr.getRunningTrack();
      } else {
        const video = document.querySelector("#qr-reader video");
        const stream = video.srcObject;
        track = stream.getVideoTracks()[0];
      }
      console.log("Setting zoom to", zoom, track);
      if (track) {
        track.applyConstraints({
          advanced: [{ zoom }]
        });
      }
    },
    async start() {
      this.running = true;
      this.finished = false;
      this.logs = [];
      this.percent = 0;
      let done = 0;
      const concurrency = 5;
      let queue = [...this.persone.filter(p => p.abilitato === true)];
      const total = queue.length;
      const promises = [];
      const processNext = async () => {
        if (queue.length === 0) return;
        const p = queue.shift();
        try {
          const payload = {
            autenticazione: true,
            dati_addizionali: {longitudine: '', latitudine: '', timestamp: Date.now()}, 
            matricola_studente: p.codicePersona,
            lingua: 'it', 
            device_token: 'device_token',
            posto: '000',
            codice_lezione: this.codice,
            action: 'CreateFromJSON'  
          };
          const res = await fetch(this.apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "*/*" },
            body: JSON.stringify(payload)
          });
          console.log(res);
          if (!res.ok) throw new Error();
          const data = await res.json();
          console.log(data);
          if (data.result !== "failure" && data.result !== "warning") {
            p.status = "ok";
          } else {
            p.status = "fail";
          }
          this.logs.push({status: p.status, message: `[${p.codicePersona} ${p.labelNominativo}]: ${data.message}`, result: data.result});
        } catch (e) {
          console.log(e);
          p.status = "fail";
          const message = `[${p.codicePersona} ${p.labelNominativo}]: ${e.message}`;
          this.logs.push({status: "fail", message: message, result: "error"});
        }
        done++;
        this.percent = Math.round(done / total * 100);
        await processNext();
      };
      for (let i = 0; i < concurrency; i++) promises.push(processNext());
      await Promise.all(promises);
      this.running = false;
      this.finished = true;
    }
  }
}).mount("#app");
</script>

</body>
</html>
